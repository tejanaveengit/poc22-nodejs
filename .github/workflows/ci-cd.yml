name: CI-CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: self-hosted   # EC2 self-hosted runner

    steps:
      # 1. Checkout source code
      - name: Checkout source code
        uses: actions/checkout@v4

      # 2. Log in to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 3. Build Docker image
      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/node-app:latest .

      # 4. Push Docker image to Docker Hub
      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/node-app:latest

      # 5. Stop and remove old container (if exists)
      - name: Stop old container
        run: |
          docker stop node-app || true
          docker rm node-app || true

      # 6. Run new container
      - name: Run new container
        run: |
          docker run -d \
            --name node-app \
            -p 3000:3000 \
            ${{ secrets.DOCKERHUB_USERNAME }}/node-app:latest
